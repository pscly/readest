name: Release Readest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag（例如 v0.9.0），留空时按 package.json 版本生成'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  get-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps['get-release'].outputs.release_id }}
      release_tag: ${{ steps['get-release'].outputs.release_tag }}
      release_note: ${{ steps['get-release-notes'].outputs.release_note }}
      release_version: ${{ steps['get-release-notes'].outputs.release_version }}

    steps:
      - uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
      - name: get release notes
        id: get-release-notes
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const version = require('./apps/readest-app/package.json').version;
            const releaseNotesFileContent = fs.readFileSync('./apps/readest-app/release-notes.json', 'utf8');
            const releaseNotes = JSON.parse(releaseNotesFileContent).releases[version] || {};
            const notes = releaseNotes.notes || [];
            const releaseNote = notes.map((note, index) => `${index + 1}. ${note}`).join(' ');
            console.log('Formatted release note:', releaseNote);
            core.setOutput('release_version', version);
            core.setOutput('release_note', releaseNote);
      - name: resolve release tag
        id: resolve-release-tag
        env:
          RELEASE_VERSION: ${{ steps['get-release-notes'].outputs.release_version }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            release_tag="${{ github.ref_name }}"
          elif [ -n "$INPUT_TAG" ]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="v${RELEASE_VERSION}"
          fi

          if [[ ! "$release_tag" =~ ^v.+$ ]]; then
            echo "Release tag must start with v, got: $release_tag"
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: get or create release by tag
        id: get-release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps['resolve-release-tag'].outputs.release_tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const ref = `tags/${tag}`;
            const fullRef = `refs/tags/${tag}`;
            const isDispatch = context.eventName === 'workflow_dispatch';
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const ensureTagRefVisible = async () => {
              const maxAttempts = 12;
              const delayMs = 5000;

              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                try {
                  const refResponse = await github.rest.git.getRef({ owner, repo, ref });
                  core.info(`Tag ref ${fullRef} is visible at ${refResponse.data.object.sha}`);
                  return;
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }

                  if (isDispatch) {
                    try {
                      await github.rest.git.createRef({
                        owner,
                        repo,
                        ref: fullRef,
                        sha: context.sha,
                      });
                      core.info(`Created missing tag ref ${fullRef} at ${context.sha}`);
                    } catch (createError) {
                      if (createError.status !== 422) {
                        throw createError;
                      }
                      core.info(`Tag ref ${fullRef} already exists or was created concurrently`);
                    }
                  }

                  if (attempt === maxAttempts) {
                    throw new Error(`Tag ref ${fullRef} is not visible after ${maxAttempts * delayMs / 1000}s`);
                  }

                  core.info(`Tag ref ${fullRef} not visible yet (attempt ${attempt}/${maxAttempts}), retry in ${delayMs / 1000}s`);
                  await sleep(delayMs);
                }
              }
            };

            await ensureTagRefVisible();

            let release;

            try {
              const response = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = response.data;
              core.info(`Found existing release by tag ${tag}: ${release.id}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner,
                repo,
                per_page: 100,
              });
              const matchedRelease = releases.find((item) => item.tag_name === tag);

              if (matchedRelease) {
                release = matchedRelease;
                core.info(`Found release by listReleases for tag ${tag}: ${release.id} (draft=${release.draft}, prerelease=${release.prerelease})`);
                if (release.draft) {
                  const updated = await github.rest.repos.updateRelease({
                    owner,
                    repo,
                    release_id: release.id,
                    tag_name: tag,
                    draft: false,
                    prerelease: true,
                  });
                  release = updated.data;
                  core.info(`Promoted draft release ${release.id} to prerelease for tag ${tag}`);
                }
              } else {
                const created = await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  name: `Readest ${tag}`,
                  draft: false,
                  prerelease: true,
                  generate_release_notes: false,
                });
                release = created.data;
                core.info(`Created prerelease for tag ${tag}: ${release.id}`);
              }
            }

            const maxVerifyAttempts = 12;
            const verifyDelayMs = 3000;
            let verifiedByTag = false;

            for (let attempt = 1; attempt <= maxVerifyAttempts; attempt++) {
              let releaseByTag;
              try {
                const byTagResponse = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                releaseByTag = byTagResponse.data;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                core.warning(`getReleaseByTag(${tag}) returned 404 (attempt ${attempt}/${maxVerifyAttempts})`);
              }

              if (releaseByTag && releaseByTag.id === release.id && releaseByTag.tag_name === tag) {
                release = releaseByTag;
                verifiedByTag = true;
                core.info(`Verified release ${release.id} is reachable by tag ${tag}`);
                break;
              }

              if (releaseByTag) {
                core.warning(`getReleaseByTag(${tag}) returned release id=${releaseByTag.id}, tag_name=${releaseByTag.tag_name}; expected id=${release.id}, tag_name=${tag} (attempt ${attempt}/${maxVerifyAttempts})`);
              }

              if (attempt < maxVerifyAttempts) {
                await sleep(verifyDelayMs);
              }
            }

            if (!verifiedByTag || !release || release.tag_name !== tag) {
              throw new Error(`Release tag verification failed: release ${release?.id ?? 'unknown'} is not stably reachable by tag ${tag}`);
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('release_tag', tag);

  update-release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: get-release

    steps:
      - name: update release
        id: update-release
        uses: actions/github-script@v8
        env:
          release_id: ${{ needs['get-release'].outputs.release_id }}
          release_tag: ${{ needs['get-release'].outputs.release_tag }}
          release_note: ${{ needs['get-release'].outputs.release_note }}
        with:
          script: |
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.release_tag,
            })
            const notes = process.env.release_note.split(/\d+\.\s/).filter(Boolean);
            const formattedNotes = notes.map(note => `* ${note.trim()}`).join("\n");
            const body = `## Release Highlight\n${formattedNotes}\n\n${data.body}`;
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              body: body
            })

  build-koreader-plugin:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: get-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: create KOReader plugin zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_upload_asset() {
            local release_id="$1"
            local file_path="$2"
            local asset_name="$3"
            local encoded_name
            local release_json
            local existing_asset_id
            local attempt
            local max_attempts=10
            local sleep_seconds=2
            local last_err=""
            local upload_err
            local tag_name

            encoded_name=$(jq -rn --arg v "$asset_name" '$v|@uri')
            # GitHub API can be eventually consistent; freshly created releases may 404 briefly.
            for attempt in $(seq 1 "$max_attempts"); do
              if release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" 2>&1); then
                break
              fi
              last_err="$release_json"
              release_json=""
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Release ${release_id} not readable yet (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            if [ -z "${release_json:-}" ]; then
              echo "::error::Failed to read release JSON for ${release_id} after ${max_attempts} attempts. Last error: ${last_err}"
              return 1
            fi
            tag_name=$(jq -r '.tag_name // empty' <<<"$release_json")
            if [ -z "$tag_name" ]; then
              echo "::error::Failed to resolve tag_name from release ${release_id}."
              return 1
            fi
            existing_asset_id=$(jq -r --arg name "$asset_name" 'first(.assets[]? | select(.name == $name) | .id) // empty' <<<"$release_json")

            if [ -n "$existing_asset_id" ]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${existing_asset_id}" >/dev/null
            fi

            last_err=""
            for attempt in $(seq 1 "$max_attempts"); do
              if upload_err=$(gh release upload -R "${GITHUB_REPOSITORY}" --clobber "${tag_name}" "${file_path}#${asset_name}" 2>&1 >/dev/null); then
                return 0
              fi
              last_err="$upload_err"
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Upload ${asset_name} failed (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            echo "::error::Failed to upload asset ${asset_name} after ${max_attempts} attempts. Last error: ${last_err}"
            return 1
          }

          release_id="${{ needs['get-release'].outputs.release_id }}"
          version=${{ needs['get-release'].outputs.release_version }}
          plugin_zip="Readest-${version}-1.koplugin.zip"
          meta_file="apps/readest.koplugin/_meta.lua"
          perl -i -pe "s/^}/    version = \"${version}\",\n}/" "${meta_file}"

          cd apps
          zip -r ../${plugin_zip} readest.koplugin
          cd ..

          echo "Uploading ${plugin_zip} to GitHub release"
          api_upload_asset "$release_id" "$plugin_zip" "$plugin_zip"

  upload-release-metadata:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: get-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: upload release notes metadata asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_upload_asset() {
            local release_id="$1"
            local file_path="$2"
            local asset_name="$3"
            local encoded_name
            local release_json
            local existing_asset_id
            local attempt
            local max_attempts=10
            local sleep_seconds=2
            local last_err=""
            local upload_err
            local tag_name

            encoded_name=$(jq -rn --arg v "$asset_name" '$v|@uri')
            # GitHub API can be eventually consistent; freshly created releases may 404 briefly.
            for attempt in $(seq 1 "$max_attempts"); do
              if release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" 2>&1); then
                break
              fi
              last_err="$release_json"
              release_json=""
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Release ${release_id} not readable yet (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            if [ -z "${release_json:-}" ]; then
              echo "::error::Failed to read release JSON for ${release_id} after ${max_attempts} attempts. Last error: ${last_err}"
              return 1
            fi
            tag_name=$(jq -r '.tag_name // empty' <<<"$release_json")
            if [ -z "$tag_name" ]; then
              echo "::error::Failed to resolve tag_name from release ${release_id}."
              return 1
            fi
            existing_asset_id=$(jq -r --arg name "$asset_name" 'first(.assets[]? | select(.name == $name) | .id) // empty' <<<"$release_json")

            if [ -n "$existing_asset_id" ]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${existing_asset_id}" >/dev/null
            fi

            last_err=""
            for attempt in $(seq 1 "$max_attempts"); do
              if upload_err=$(gh release upload -R "${GITHUB_REPOSITORY}" --clobber "${tag_name}" "${file_path}#${asset_name}" 2>&1 >/dev/null); then
                return 0
              fi
              last_err="$upload_err"
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Upload ${asset_name} failed (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            echo "::error::Failed to upload asset ${asset_name} after ${max_attempts} attempts. Last error: ${last_err}"
            return 1
          }

          release_id="${{ needs['get-release'].outputs.release_id }}"
          file_path="apps/readest-app/release-notes.json"

          echo "Uploading ${file_path} to GitHub release"
          api_upload_asset "$release_id" "$file_path" "release-notes.json"

  build-tauri:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: get-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-latest
            release: android
            rust_target: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          - os: ubuntu-22.04
            release: linux
            arch: x86_64
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            release: linux
            arch: aarch64
            rust_target: aarch64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            release: linux
            arch: armhf
            rust_target: arm-unknown-linux-gnueabihf
            args: '--target arm-unknown-linux-gnueabihf --bundles deb'
          - os: macos-latest
            release: macos
            arch: aarch64
            rust_target: x86_64-apple-darwin,aarch64-apple-darwin
            args: '--target universal-apple-darwin'
          - os: windows-latest
            release: windows
            arch: x86_64
            rust_target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc --bundles nsis'
          - os: windows-latest
            release: windows
            arch: aarch64
            rust_target: aarch64-pc-windows-msvc
            args: '--target aarch64-pc-windows-msvc --bundles nsis'

    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 60
    env:
      APPLE_SIGNING_ENABLED: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: initialize git submodules
        run: git submodule update --init --recursive

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: setup Java (for Android build only)
        if: matrix.config.release == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK (for Android build only)
        if: matrix.config.release == 'android'
        uses: android-actions/setup-android@v3

      - name: install NDK (for Android build only)
        if: matrix.config.release == 'android'
        run: sdkmanager "ndk;28.2.13676358"

      - name: install dependencies
        run: pnpm install

      - name: copy pdfjs-dist and simplecc-dist to public directory
        run: pnpm --filter @readest/readest-app setup-vendors

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.config.os }}-${{ matrix.config.release }}-${{ matrix.config.arch }}-cargo

      - name: install dependencies (ubuntu only)
        if: contains(matrix.config.os, 'ubuntu') && matrix.config.release != 'android' && matrix.config.arch != 'armhf'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: install dependencies (ubuntu only - armhf specific)
        if: contains(matrix.config.os, 'ubuntu') && matrix.config.arch == 'armhf'
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig-dev:armhf libgtk-3-dev:armhf libwebkit2gtk-4.1-dev:armhf libappindicator3-dev:armhf librsvg2-dev:armhf gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          echo 'PKG_CONFIG_ALLOW_CROSS=1' >> $GITHUB_ENV
          echo 'PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig' >> $GITHUB_ENV
          echo 'PKG_CONFIG_SYSROOT_DIR=/usr/arm-linux-gnueabihf' >> $GITHUB_ENV
          echo 'CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc' >> $GITHUB_ENV

      - name: create .env.local file for Next.js
        run: |
          echo "NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_APP_PLATFORM=tauri" >> .env.local
          cp .env.local apps/readest-app/.env.local

      - name: build and upload Android apks
        if: matrix.config.release == 'android'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          echo "::add-mask::${{ secrets.ANDROID_KEY_BASE64 }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_PASSWORD }}"
          echo "::add-mask::${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          echo "::add-mask::${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"

          cd apps/readest-app/
          rm -rf src-tauri/gen/android
          pnpm tauri android init
          pnpm tauri icon ../../data/icons/readest-book.png
          git checkout .

          pushd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

          popd
          version=${{ needs['get-release'].outputs.release_version }}
          apk_path=src-tauri/gen/android/app/build/outputs/apk/universal/release
          universial_apk=Readest_${version}_universal.apk
          arm64_apk=Readest_${version}_arm64.apk
          pnpm tauri android build
          cp ${apk_path}/app-universal-release.apk $universial_apk
          pnpm tauri android build -t aarch64
          cp ${apk_path}/app-universal-release.apk $arm64_apk

          APKSIGNER=$(ls -1 "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -n 1)
          apksigner="$APKSIGNER"
          $apksigner verify --verbose "$universial_apk"
          $apksigner verify --verbose "$arm64_apk"

          api_upload_asset() {
            local release_id="$1"
            local file_path="$2"
            local asset_name="$3"
            local encoded_name
            local release_json
            local existing_asset_id
            local attempt
            local max_attempts=10
            local sleep_seconds=2
            local last_err=""
            local upload_err
            local tag_name

            encoded_name=$(jq -rn --arg v "$asset_name" '$v|@uri')
            # GitHub API can be eventually consistent; freshly created releases may 404 briefly.
            for attempt in $(seq 1 "$max_attempts"); do
              if release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" 2>&1); then
                break
              fi
              last_err="$release_json"
              release_json=""
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Release ${release_id} not readable yet (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            if [ -z "${release_json:-}" ]; then
              echo "::error::Failed to read release JSON for ${release_id} after ${max_attempts} attempts. Last error: ${last_err}"
              return 1
            fi
            tag_name=$(jq -r '.tag_name // empty' <<<"$release_json")
            if [ -z "$tag_name" ]; then
              echo "::error::Failed to resolve tag_name from release ${release_id}."
              return 1
            fi
            existing_asset_id=$(jq -r --arg name "$asset_name" 'first(.assets[]? | select(.name == $name) | .id) // empty' <<<"$release_json")

            if [ -n "$existing_asset_id" ]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${existing_asset_id}" >/dev/null
            fi

            last_err=""
            for attempt in $(seq 1 "$max_attempts"); do
              if upload_err=$(gh release upload -R "${GITHUB_REPOSITORY}" --clobber "${tag_name}" "${file_path}#${asset_name}" 2>&1 >/dev/null); then
                return 0
              fi
              last_err="$upload_err"
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Upload ${asset_name} failed (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            echo "::error::Failed to upload asset ${asset_name} after ${max_attempts} attempts. Last error: ${last_err}"
            return 1
          }

          release_id="${{ needs['get-release'].outputs.release_id }}"

          echo "Uploading $universial_apk to GitHub release"
          api_upload_asset "$release_id" "$universial_apk" "$universial_apk"
          echo "Uploading $arm64_apk to GitHub release"
          api_upload_asset "$release_id" "$arm64_apk" "$arm64_apk"
          echo "Uploading signatures to GitHub release"
          pnpm tauri signer sign $universial_apk
          pnpm tauri signer sign $arm64_apk
          api_upload_asset "$release_id" "$universial_apk.sig" "$universial_apk.sig"
          api_upload_asset "$release_id" "$arm64_apk.sig" "$arm64_apk.sig"

      - name: Override tauri-cli with custom AppImage format (Linux)
        if: matrix.config.release == 'linux'
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --force

      - name: build desktop bundles (non-macos)
        if: matrix.config.release != 'android' && matrix.config.release != 'macos'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        with:
          projectPath: apps/readest-app
          releaseId: ${{ needs['get-release'].outputs.release_id }}
          releaseBody: ${{ needs['get-release'].outputs.release_note }}
          args: ${{ matrix.config.args || '' }}

      - name: build macOS bundles (signed)
        id: tauri-build-macos-signed
        if: ${{ matrix.config.release == 'macos' && env.APPLE_SIGNING_ENABLED == 'true' }}
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        with:
          projectPath: apps/readest-app
          releaseId: ${{ needs['get-release'].outputs.release_id }}
          releaseBody: ${{ needs['get-release'].outputs.release_note }}
          args: ${{ matrix.config.args || '' }}

      - name: build macOS bundles (unsigned fallback)
        if: ${{ matrix.config.release == 'macos' && steps['tauri-build-macos-signed'].outcome != 'success' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        with:
          projectPath: apps/readest-app
          releaseId: ${{ needs['get-release'].outputs.release_id }}
          releaseBody: ${{ needs['get-release'].outputs.release_note }}
          args: ${{ matrix.config.args || '' }}

      - name: build and upload portable binaries (Windows only)
        if: matrix.config.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          echo "Building Portable Binaries"
          pushd apps/readest-app/
          echo "NEXT_PUBLIC_PORTABLE_APP=true" >> .env.local
          pnpm tauri build ${{ matrix.config.args }}

          popd
          echo "Uploading Portable Binaries"
          arch=${{ matrix.config.arch }}
          version=${{ needs['get-release'].outputs.release_version }}

          if [ "$arch" = "x86_64" ]; then
            bin_file="Readest_${version}_x64-portable.exe"
          elif [ "$arch" = "aarch64" ]; then
            bin_file="Readest_${version}_arm64-portable.exe"
          else
            echo "Unknown architecture: $arch"
            exit 1
          fi

          exe_file="target/${{ matrix.config.rust_target }}/release/readest.exe"
          # Browsers on Windows won't download zip files that contain exe files
          # so upload the exe files instead. This is totally stupid.
          # powershell.exe -Command "Compress-Archive -Path $exe_file -DestinationPath $bin_file -Force"
          cp $exe_file $bin_file

          api_upload_asset() {
            local release_id="$1"
            local file_path="$2"
            local asset_name="$3"
            local encoded_name
            local release_json
            local existing_asset_id
            local attempt
            local max_attempts=10
            local sleep_seconds=2
            local last_err=""
            local upload_err
            local tag_name

            encoded_name=$(jq -rn --arg v "$asset_name" '$v|@uri')
            # GitHub API can be eventually consistent; freshly created releases may 404 briefly.
            for attempt in $(seq 1 "$max_attempts"); do
              if release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" 2>&1); then
                break
              fi
              last_err="$release_json"
              release_json=""
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Release ${release_id} not readable yet (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            if [ -z "${release_json:-}" ]; then
              echo "::error::Failed to read release JSON for ${release_id} after ${max_attempts} attempts. Last error: ${last_err}"
              return 1
            fi
            tag_name=$(jq -r '.tag_name // empty' <<<"$release_json")
            if [ -z "$tag_name" ]; then
              echo "::error::Failed to resolve tag_name from release ${release_id}."
              return 1
            fi
            existing_asset_id=$(jq -r --arg name "$asset_name" 'first(.assets[]? | select(.name == $name) | .id) // empty' <<<"$release_json")

            if [ -n "$existing_asset_id" ]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${existing_asset_id}" >/dev/null
            fi

            last_err=""
            for attempt in $(seq 1 "$max_attempts"); do
              if upload_err=$(gh release upload -R "${GITHUB_REPOSITORY}" --clobber "${tag_name}" "${file_path}#${asset_name}" 2>&1 >/dev/null); then
                return 0
              fi
              last_err="$upload_err"
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Upload ${asset_name} failed (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            echo "::error::Failed to upload asset ${asset_name} after ${max_attempts} attempts. Last error: ${last_err}"
            return 1
          }

          release_id="${{ needs['get-release'].outputs.release_id }}"

          echo "Uploading $bin_file to GitHub release"
          api_upload_asset "$release_id" "$bin_file" "$bin_file"

          echo "Signing portable binary"
          pushd apps/readest-app/
          pnpm tauri signer sign "../../$bin_file"
          popd
          echo "Uploading signature to GitHub release"
          api_upload_asset "$release_id" "$bin_file.sig" "$bin_file.sig"

  update-latest-json:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [get-release, build-tauri]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: prepare latest.json baseline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_download_asset() {
            local release_id="$1"
            local asset_name="$2"
            local out_path="$3"
            local release_json
            local asset_id

            release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}")
            asset_id=$(jq -r --arg name "$asset_name" 'first(.assets[]? | select(.name == $name) | .id) // empty' <<<"$release_json")
            if [ -z "$asset_id" ]; then
              return 1
            fi

            gh api -H "Accept: application/octet-stream" "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" > "$out_path"
          }

          current_release_id="${{ needs['get-release'].outputs.release_id }}"

          if api_download_asset "$current_release_id" "latest.json" "latest.json"; then
            echo "Use existing latest.json from current release"
          else
            echo "No latest.json on current release, fallback to latest published release"
            if latest_release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.id' 2>/dev/null); then
              api_download_asset "$latest_release_id" "latest.json" "latest.json"
            else
              echo "::error::Cannot find latest published release to bootstrap latest.json"
              exit 1
            fi
          fi

      - name: download updater signatures from current release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_download_asset() {
            local release_id="$1"
            local asset_name="$2"
            local out_path="$3"
            local release_json
            local asset_id

            release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}")
            asset_id=$(jq -r --arg name "$asset_name" 'first(.assets[]? | select(.name == $name) | .id) // empty' <<<"$release_json")
            if [ -z "$asset_id" ]; then
              echo "::error::Asset not found in release ${release_id}: ${asset_name}"
              return 1
            fi

            gh api -H "Accept: application/octet-stream" "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" > "$out_path"
          }

          release_id="${{ needs['get-release'].outputs.release_id }}"
          version="${{ needs['get-release'].outputs.release_version }}"

          api_download_asset "$release_id" "Readest_${version}_universal.apk.sig" "Readest_${version}_universal.apk.sig"
          api_download_asset "$release_id" "Readest_${version}_arm64.apk.sig" "Readest_${version}_arm64.apk.sig"
          api_download_asset "$release_id" "Readest_${version}_x64-portable.exe.sig" "Readest_${version}_x64-portable.exe.sig"
          api_download_asset "$release_id" "Readest_${version}_arm64-portable.exe.sig" "Readest_${version}_arm64-portable.exe.sig"

      - name: update latest.json once for all updater platforms
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_upload_asset() {
            local release_id="$1"
            local file_path="$2"
            local asset_name="$3"
            local encoded_name
            local release_json
            local existing_asset_id
            local attempt
            local max_attempts=10
            local sleep_seconds=2
            local last_err=""
            local upload_err
            local tag_name

            encoded_name=$(jq -rn --arg v "$asset_name" '$v|@uri')
            # GitHub API can be eventually consistent; freshly created releases may 404 briefly.
            for attempt in $(seq 1 "$max_attempts"); do
              if release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" 2>&1); then
                break
              fi
              last_err="$release_json"
              release_json=""
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Release ${release_id} not readable yet (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            if [ -z "${release_json:-}" ]; then
              echo "::error::Failed to read release JSON for ${release_id} after ${max_attempts} attempts. Last error: ${last_err}"
              return 1
            fi
            tag_name=$(jq -r '.tag_name // empty' <<<"$release_json")
            if [ -z "$tag_name" ]; then
              echo "::error::Failed to resolve tag_name from release ${release_id}."
              return 1
            fi
            existing_asset_id=$(jq -r --arg name "$asset_name" 'first(.assets[]? | select(.name == $name) | .id) // empty' <<<"$release_json")

            if [ -n "$existing_asset_id" ]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${existing_asset_id}" >/dev/null
            fi

            last_err=""
            for attempt in $(seq 1 "$max_attempts"); do
              if upload_err=$(gh release upload -R "${GITHUB_REPOSITORY}" --clobber "${tag_name}" "${file_path}#${asset_name}" 2>&1 >/dev/null); then
                return 0
              fi
              last_err="$upload_err"
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Upload ${asset_name} failed (attempt ${attempt}/${max_attempts}); sleep ${sleep_seconds}s and retry..."
                sleep "$sleep_seconds"
              fi
            done
            echo "::error::Failed to upload asset ${asset_name} after ${max_attempts} attempts. Last error: ${last_err}"
            return 1
          }

          release_id="${{ needs['get-release'].outputs.release_id }}"
          tag="${{ needs['get-release'].outputs.release_tag }}"
          version="${{ needs['get-release'].outputs.release_version }}"
          repo="${{ github.repository }}"

          android_universal_url="https://github.com/${repo}/releases/download/${tag}/Readest_${version}_universal.apk"
          android_arm64_url="https://github.com/${repo}/releases/download/${tag}/Readest_${version}_arm64.apk"
          windows_x64_portable_url="https://github.com/${repo}/releases/download/${tag}/Readest_${version}_x64-portable.exe"
          windows_arm64_portable_url="https://github.com/${repo}/releases/download/${tag}/Readest_${version}_arm64-portable.exe"

          android_universal_sig=$(cat "Readest_${version}_universal.apk.sig")
          android_arm64_sig=$(cat "Readest_${version}_arm64.apk.sig")
          windows_x64_portable_sig=$(cat "Readest_${version}_x64-portable.exe.sig")
          windows_arm64_portable_sig=$(cat "Readest_${version}_arm64-portable.exe.sig")

          jq \
            --arg android_universal_url "$android_universal_url" \
            --arg android_universal_sig "$android_universal_sig" \
            --arg android_arm64_url "$android_arm64_url" \
            --arg android_arm64_sig "$android_arm64_sig" \
            --arg windows_x64_portable_url "$windows_x64_portable_url" \
            --arg windows_x64_portable_sig "$windows_x64_portable_sig" \
            --arg windows_arm64_portable_url "$windows_arm64_portable_url" \
            --arg windows_arm64_portable_sig "$windows_arm64_portable_sig" \
            '.platforms["android-universal"] = {signature: $android_universal_sig, url: $android_universal_url}
             | .platforms["android-arm64"] = {signature: $android_arm64_sig, url: $android_arm64_url}
             | .platforms["windows-x86_64-portable"] = {signature: $windows_x64_portable_sig, url: $windows_x64_portable_url}
             | .platforms["windows-aarch64-portable"] = {signature: $windows_arm64_portable_sig, url: $windows_arm64_portable_url}' \
            latest.json > tmp.$$.json && mv tmp.$$.json latest.json

          echo "Uploading updated latest.json to GitHub release"
          api_upload_asset "$release_id" "latest.json" "latest.json"

  validate-latest-json-platform-assets:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [get-release, update-latest-json]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: validate latest.json platform keys and release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_download_asset() {
            local release_id="$1"
            local asset_name="$2"
            local out_path="$3"
            local release_json
            local asset_id

            release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}")
            asset_id=$(jq -r --arg name "$asset_name" 'first(.assets[]? | select(.name == $name) | .id) // empty' <<<"$release_json")
            if [ -z "$asset_id" ]; then
              echo "::error::Asset not found in release ${release_id}: ${asset_name}"
              return 1
            fi

            gh api -H "Accept: application/octet-stream" "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" > "$out_path"
          }

          release_id="${{ needs['get-release'].outputs.release_id }}"
          release_version="${{ needs['get-release'].outputs.release_version }}"

          api_download_asset "$release_id" "latest.json" "latest.json"
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" > release.json

          failed=0
          latest_version=$(jq -r '.version // empty' latest.json)
          if [ -z "$latest_version" ]; then
            echo "::error::latest.json.version is empty."
            failed=1
          elif [ "$latest_version" != "$release_version" ]; then
            echo "::error::latest.json.version ($latest_version) does not match release version ($release_version)."
            failed=1
          fi

          required_keys=(
            "android-universal"
            "android-arm64"
            "windows-x86_64-portable"
            "windows-aarch64-portable"
            "linux-x86_64-appimage"
            "linux-aarch64-appimage"
          )

          echo "Required latest.json platform keys:"
          printf ' - %s\n' "${required_keys[@]}"

          for key in "${required_keys[@]}"; do
            url=$(jq -r --arg key "$key" '.platforms[$key].url // empty' latest.json)
            signature=$(jq -r --arg key "$key" '.platforms[$key].signature // empty' latest.json)

            if [ -z "$url" ]; then
              echo "::error::latest.json.platforms[\"${key}\"].url is empty."
              failed=1
              continue
            fi

            if [ -z "$signature" ]; then
              echo "::error::latest.json.platforms[\"${key}\"].signature is empty."
              failed=1
            fi

            asset_name=$(basename "${url%%\?*}")
            if ! jq -e --arg asset_name "$asset_name" '.assets[].name | select(. == $asset_name)' release.json >/dev/null; then
              echo "::error::latest.json.platforms[\"${key}\"].url points to missing release asset: ${asset_name}."
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "::error::latest.json platform validation failed."
            exit 1
          fi

          echo "latest.json platform validation passed."

  verify-release-assets:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      [
        get-release,
        build-koreader-plugin,
        build-tauri,
        update-latest-json,
        validate-latest-json-platform-assets,
      ]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: verify critical release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_id="${{ needs['get-release'].outputs.release_id }}"
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" > release.json

          echo "Release assets for release_id=${release_id}:"
          jq -r '.assets[].name' release.json

          has_windows_installer=$(jq '[.assets[].name | select(test("(?i)\\.exe$") and (test("portable"; "i") | not))] | length > 0' release.json)
          has_windows_portable=$(jq '[.assets[].name | select(test("portable"; "i") and test("(?i)\\.exe$"))] | length > 0' release.json)
          has_android_universal=$(jq '[.assets[].name | select(test("^Readest_.*_universal\\.apk$"))] | length > 0' release.json)
          has_android_arm64=$(jq '[.assets[].name | select(test("^Readest_.*_arm64\\.apk$"))] | length > 0' release.json)

          missing=0
          if [ "$has_windows_installer" != "true" ]; then
            echo "::error::Missing Windows installer asset (*.exe without portable marker)."
            missing=1
          fi
          if [ "$has_windows_portable" != "true" ]; then
            echo "::error::Missing Windows portable asset (*portable*.exe)."
            missing=1
          fi
          if [ "$has_android_universal" != "true" ]; then
            echo "::error::Missing Android universal asset (*_universal.apk)."
            missing=1
          fi
          if [ "$has_android_arm64" != "true" ]; then
            echo "::error::Missing Android arm64 asset (*_arm64.apk)."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Critical release assets verification failed."
            exit 1
          fi

          echo "Critical release assets verification passed."

  upload-to-r2:
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      vars.ENABLE_R2_UPLOAD == 'true'
    needs:
      [get-release, build-tauri, upload-release-metadata, update-latest-json, verify-release-assets]
    uses: ./.github/workflows/upload-to-r2.yml
    with:
      tag: ${{ needs['get-release'].outputs.release_tag }}
    secrets: inherit

  publish-release:
    if: >
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs['get-release'].result == 'success' &&
      needs['update-release'].result == 'success' &&
      needs['build-koreader-plugin'].result == 'success' &&
      needs['build-tauri'].result == 'success' &&
      needs['upload-release-metadata'].result == 'success' &&
      needs['update-latest-json'].result == 'success' &&
      needs['verify-release-assets'].result == 'success' &&
      (needs['upload-to-r2'].result == 'success' || needs['upload-to-r2'].result == 'skipped')
    needs:
      [
        get-release,
        update-release,
        build-koreader-plugin,
        build-tauri,
        upload-release-metadata,
        update-latest-json,
        verify-release-assets,
        upload-to-r2,
      ]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: publish release
        uses: actions/github-script@v8
        env:
          release_id: ${{ needs['get-release'].outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.release_id),
              draft: false,
              prerelease: false
            });
